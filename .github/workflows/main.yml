name: Main Branch CI

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests with coverage
        run: make test-with-coverage

      - name: Generate coverage badge
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: coverage.out
          local-prefix: github.com/${{ github.repository }}
          badge-file-name: .badges/coverage.svg

      - name: Run goreportcard-cli
        run: |
          go install github.com/gojp/goreportcard/cmd/goreportcard-cli@latest
          goreportcard-cli -v || echo "goreportcard check complete"

      - name: Trigger Go Report Card refresh
        continue-on-error: true
        run: |
          curl -X POST "https://goreportcard.com/checks" \
            -d "repo=github.com/${{ github.repository }}"

      - name: Create Go Report Card Badge
        run: |
          mkdir -p .badges
          # Fetch the badge from goreportcard.com
          curl -o .badges/goreportcard.svg "https://goreportcard.com/badge/github.com/${{ github.repository }}"

      - name: Push badges to badges branch
        run: |
          set -euo pipefail
          mkdir -p /tmp/badges
          cp -f .badges/*.svg /tmp/badges/

          git fetch origin badges || true

          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git checkout badges
            NEW_BRANCH=false
          else
            git checkout --orphan badges
            git rm -rf .
            git clean -fdx
            NEW_BRANCH=true
          fi

          mkdir -p .badges
          cp -f /tmp/badges/*.svg .badges/
          git add .badges/*.svg

          if git diff --cached --quiet; then
            if [ "${NEW_BRANCH}" = "true" ]; then
              # Ensure the branch exists even if badges didn't change.
              touch .badges/.gitkeep
              git add .badges/.gitkeep
            else
              echo "No badge changes."
              exit 0
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update badges [skip ci]"
          git push origin badges
