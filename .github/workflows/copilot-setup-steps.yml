name: "Copilot Setup Steps"

on: workflow_dispatch
 
permissions:
  contents: read
 
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-only: true

      - name: Install fieldalignment
        run: go install golang.org/x/tools/go/analysis/passes/fieldalignment/cmd/fieldalignment@latest

      - name: Install Playwright Browsers
        run: go run github.com/playwright-community/playwright-go/cmd/playwright@latest install --with-deps chromium

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Download Go modules
        run: go mod download

      - name: Verify build
        run: go build ./...
