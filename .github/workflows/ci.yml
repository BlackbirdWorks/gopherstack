name: Pull Request CI

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

  unit_tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Run Unit Tests with Coverage
        run: make test-with-coverage

      - name: Enforce 85% Coverage Minimum
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: coverage.out
          local-prefix: github.com/${{ github.repository }}
          git-token: ${{ secrets.GITHUB_TOKEN }}
          git-branch: ${{ github.head_ref || github.ref_name }}
          debug: true

      - name: Comment PR with Coverage Warning
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let coverageOutput = '';
            try {
              coverageOutput = fs.readFileSync('coverage.out', 'utf8');
            } catch (e) {
              console.log('Coverage file not found');
            }
            
            const body = `## 📊 Code Coverage Check
            
            ⚠️ **Important:** This project maintains a minimum coverage threshold of **85%**.
            
            Coverage should never decrease. Please ensure your changes maintain or improve test coverage.
            
            - If coverage is below 85%, this PR cannot be merged
            - Add tests for any new functionality
            - Ensure edge cases are covered
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit_tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install Playwright Browsers
        run: |
          go run github.com/playwright-community/playwright-go/cmd/playwright@latest install --with-deps chromium

      - name: Run E2E Tests
        run: make e2e-test
