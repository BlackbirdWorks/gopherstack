# go-test-coverage configuration

# This file is used by vladopajic/go-test-coverage to enforce coverage thresholds.
# It is also used by our custom reporting script in ci.yml.

# Total coverage threshold (percentage)
threshold:
  total: 80

# Package-specific thresholds or overrides can be added here
# override:
#   - package: github.com/blackbirdworks/gopherstack/pkgs/lockmetrics
#     threshold: 70

# List of packages to ignore
# exclude:
#   - packages:
#     - github.com/blackbirdworks/gopherstack/test/integration
