<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="8" fill="#7B4B94"/>
  <g fill="white">
    <!-- Brain/AI chip outline -->
    <rect x="12" y="14" width="24" height="20" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Neural network nodes -->
    <circle cx="18" cy="20" r="2.5" fill="white"/>
    <circle cx="30" cy="20" r="2.5" fill="white"/>
    <circle cx="24" cy="28" r="2.5" fill="white"/>
    <!-- Connection lines -->
    <line x1="18" y1="20" x2="30" y2="20" stroke="white" stroke-width="1.5"/>
    <line x1="18" y1="20" x2="24" y2="28" stroke="white" stroke-width="1.5"/>
    <line x1="30" y1="20" x2="24" y2="28" stroke="white" stroke-width="1.5"/>
    <!-- Side connectors -->
    <line x1="9" y1="20" x2="12" y2="20" stroke="white" stroke-width="2"/>
    <line x1="9" y1="28" x2="12" y2="28" stroke="white" stroke-width="2"/>
    <line x1="36" y1="20" x2="39" y2="20" stroke="white" stroke-width="2"/>
    <line x1="36" y1="28" x2="39" y2="28" stroke="white" stroke-width="2"/>
  </g>
</svg>
