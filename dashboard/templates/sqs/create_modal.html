{{define "sqs/create_modal.html"}}
<div class="relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity dark:bg-gray-900 dark:bg-opacity-80"></div>
    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-lg bg-white dark:bg-gray-800 px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:p-6">
                <form hx-post="/dashboard/sqs/create" hx-target="body">
                    <div class="mt-3 text-center sm:mt-5">
                        <h3 class="text-base font-semibold leading-6 text-gray-900 dark:text-white" id="modal-title">
                            Create Queue
                        </h3>
                        <div class="mt-4 text-left space-y-4">
                            <div class="form-control">
                                <label for="queue_name" class="label"><span class="label-text">Queue name</span></label>
                                <input type="text" name="queue_name" id="queue_name" required
                                    placeholder="my-queue or my-queue.fifo"
                                    class="input input-bordered w-full">
                                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Use <code>.fifo</code> suffix for FIFO queues.</p>
                            </div>
                            <div class="form-control">
                                <label for="visibility_timeout" class="label"><span class="label-text">Visibility Timeout (seconds)</span></label>
                                <input type="number" name="visibility_timeout" id="visibility_timeout"
                                    value="30" min="0" max="43200"
                                    class="input input-bordered w-full">
                            </div>
                        </div>
                    </div>
                    <div class="mt-5 sm:mt-6 sm:grid sm:grid-flow-row-dense sm:grid-cols-2 sm:gap-3">
                        <button type="submit" class="btn btn-primary w-full sm:col-start-2">Create</button>
                        <button type="button"
                            class="btn btn-ghost w-full mt-3 sm:col-start-1 sm:mt-0"
                            onclick="document.getElementById('modal-container').innerHTML = ''">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{end}}
