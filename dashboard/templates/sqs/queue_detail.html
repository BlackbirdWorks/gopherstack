{{define "content"}}
<div class="px-4 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center">
        <div class="sm:flex-auto">
            <h1 class="text-base font-semibold leading-6 text-gray-900 dark:text-gray-100">Queue Detail</h1>
        </div>
        <div class="mt-4 sm:ml-16 sm:mt-0 sm:flex-none">
            <a href="/dashboard/sqs"
                class="block rounded-md bg-gray-100 dark:bg-gray-700 px-3 py-2 text-center text-sm font-semibold text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600">
                ← Back to Queues
            </a>
        </div>
    </div>
    <div class="mt-8">
        <dl class="grid grid-cols-1 gap-x-4 gap-y-6 sm:grid-cols-2">
            {{range $k, $v := .Attributes}}
            <div class="sm:col-span-1">
                <dt class="text-sm font-medium text-gray-500 dark:text-gray-400">{{$k}}</dt>
                <dd class="mt-1 text-sm text-gray-900 dark:text-gray-100 break-all">{{$v}}</dd>
            </div>
            {{end}}
        </dl>
    </div>
</div>
{{end}}
