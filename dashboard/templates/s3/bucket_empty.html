{{define "s3-empty"}}
<div
    class="flex flex-col items-center justify-center p-12 bg-white dark:bg-gray-800 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-xl">
    <svg class="w-16 h-16 text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8">
        </path>
    </svg>
    <h3 class="text-lg font-medium text-gray-900 dark:text-white">This bucket is empty</h3>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 max-w-sm text-center">There are no objects in this bucket.
        Start by uploading your first file.</p>
    <div class="mt-6">
        <button data-modal-target="upload_modal" data-modal-toggle="upload_modal"
            class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
            </svg>
            Upload File
        </button>
    </div>
</div>
{{end}}
