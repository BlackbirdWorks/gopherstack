{{define "content"}}
<div class="space-y-6">
    <!-- Header -->
    <div
        class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm glass-panel flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
                <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418">
                    </path>
                </svg>
                API Gateway
                {{if .Snippet}}
                {{template "components/snippet" .Snippet}}
                {{end}}
            </h1>
            <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">REST APIs in your in-memory API Gateway
                environment.</p>
        </div>
    </div>
    <div
        class="mt-8 relative overflow-x-auto shadow-sm sm:rounded-xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm">
        <table class="w-full text-sm text-left text-slate-500 dark:text-slate-400">
            <thead class="text-xs text-gray-700 uppercase bg-slate-50/50 dark:bg-slate-800/50 dark:text-slate-400">
                <tr>
                    <th class="px-6 py-3">ID</th>
                    <th class="px-6 py-3">Name</th>
                    <th class="px-6 py-3">Description</th>
                    <th class="px-6 py-3">Created</th>
                </tr>
            </thead>
            <tbody>
                {{range .APIs}}
                <tr class="bg-transparent border-b border-slate-200 dark:border-slate-700 dark:bg-transparent">
                    <td class="px-6 py-4 font-mono text-slate-900 dark:text-white">
                        <a href="/dashboard/apigateway/api?id={{.ID}}"
                            class="text-blue-600 hover:underline dark:text-blue-400">{{.ID}}</a>
                    </td>
                    <td class="px-6 py-4 font-semibold text-slate-900 dark:text-white">{{.Name}}</td>
                    <td class="px-6 py-4 text-slate-500 dark:text-slate-400">{{.Description}}</td>
                    <td class="px-6 py-4 text-xs font-mono">{{.CreatedDate}}</td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="4" class="px-6 py-8 text-center text-sm text-slate-500 dark:text-slate-400">No REST
                        APIs found.</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
