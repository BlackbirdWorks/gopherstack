{{define "content"}}
<div class="px-4 sm:px-6 lg:px-8">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">State Machine: {{.StateMachine.Name}}</h1>
    <div class="mt-4">
        <a href="/dashboard/stepfunctions" class="text-blue-600 hover:underline dark:text-blue-400">← Back to State Machines</a>
    </div>
    <div class="mt-6 grid grid-cols-2 gap-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-4 shadow">
            <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase">Type</h2>
            <p class="mt-1 font-mono text-gray-900 dark:text-white">{{.StateMachine.Type}}</p>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-lg p-4 shadow">
            <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase">Status</h2>
            <p class="mt-1 font-mono text-gray-900 dark:text-white">{{.StateMachine.Status}}</p>
        </div>
    </div>
    <h2 class="mt-8 text-xl font-semibold text-gray-900 dark:text-white">Executions</h2>
    <div class="mt-4 relative overflow-x-auto shadow-md sm:rounded-lg">
        <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                <tr>
                    <th class="px-6 py-3">Name</th>
                    <th class="px-6 py-3">Status</th>
                    <th class="px-6 py-3">Start Date</th>
                </tr>
            </thead>
            <tbody>
                {{range .Executions}}
                <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                    <td class="px-6 py-4 font-mono text-gray-900 dark:text-white">{{.Name}}</td>
                    <td class="px-6 py-4 font-mono text-gray-500 dark:text-gray-400">{{.Status}}</td>
                    <td class="px-6 py-4 font-mono text-gray-500 dark:text-gray-400">{{.StartDate}}</td>
                </tr>
                {{else}}
                <tr><td colspan="3" class="px-6 py-8 text-center text-sm text-gray-500 dark:text-gray-400">No executions found.</td></tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
