{{define "content"}}
<div class="px-4 sm:px-6 lg:px-8">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Step Functions</h1>
    <p class="mt-2 text-sm text-gray-700 dark:text-gray-300">State machines in your in-memory Step Functions environment.</p>
    <div class="mt-8 relative overflow-x-auto shadow-md sm:rounded-lg">
        <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                <tr>
                    <th class="px-6 py-3">Name</th>
                    <th class="px-6 py-3">Type</th>
                    <th class="px-6 py-3">Status</th>
                    <th class="px-6 py-3">ARN</th>
                </tr>
            </thead>
            <tbody>
                {{range .StateMachines}}
                <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                    <td class="px-6 py-4 font-mono text-gray-900 dark:text-white">
                        <a href="/dashboard/stepfunctions/statemachine?arn={{.StateMachineArn}}" class="text-blue-600 hover:underline dark:text-blue-400">{{.Name}}</a>
                    </td>
                    <td class="px-6 py-4 font-mono text-gray-500 dark:text-gray-400">{{.Type}}</td>
                    <td class="px-6 py-4 font-mono text-gray-500 dark:text-gray-400">{{.Status}}</td>
                    <td class="px-6 py-4 font-mono text-xs text-gray-500 dark:text-gray-400">{{.StateMachineArn}}</td>
                </tr>
                {{else}}
                <tr><td colspan="4" class="px-6 py-8 text-center text-sm text-gray-500 dark:text-gray-400">No state machines found.</td></tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
