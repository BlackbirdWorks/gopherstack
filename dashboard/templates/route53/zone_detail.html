{{define "content"}}
<div class="px-4 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center justify-between mb-6">
        <div class="sm:flex-auto">
            <nav class="text-sm text-slate-500 dark:text-slate-400 mb-2">
                <a href="/dashboard/route53" class="hover:underline text-blue-600 dark:text-blue-400">Hosted Zones</a>
                <span class="mx-2">›</span>
                <span>{{.ZoneName}}</span>
            </nav>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">{{.ZoneName}}</h1>
            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400 font-mono">Zone ID: {{.ZoneID}}</p>
        </div>
        <div class="mt-4 sm:ml-16 sm:mt-0 sm:flex-none">
            <button type="button" onclick="document.getElementById('create-record-modal').classList.remove('hidden')"
                class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800">
                + Create Record
            </button>
        </div>
    </div>

    <div class="mt-4 relative overflow-x-auto shadow-sm sm:rounded-xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm">
        <table class="w-full text-sm text-left rtl:text-right text-slate-500 dark:text-slate-400">
            <thead class="text-xs text-gray-700 uppercase bg-slate-50/50 dark:bg-slate-800/50 dark:text-slate-400">
                <tr>
                    <th scope="col" class="px-6 py-3">Name</th>
                    <th scope="col" class="px-6 py-3">Type</th>
                    <th scope="col" class="px-6 py-3">TTL</th>
                    <th scope="col" class="px-6 py-3">Value</th>
                    <th scope="col" class="px-6 py-3 text-right"><span class="sr-only">Actions</span></th>
                </tr>
            </thead>
            <tbody>
                {{range .Records}}
                <tr class="bg-white border-b border-slate-200 dark:border-slate-700 dark:bg-slate-800/50 hover:bg-slate-50/80 dark:hover:bg-slate-700/50 transition-colors">
                    <td class="px-6 py-4 font-medium text-slate-900 dark:text-white font-mono text-xs">{{.Name}}</td>
                    <td class="px-6 py-4">
                        <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-blue-900 dark:text-blue-300">{{.Type}}</span>
                    </td>
                    <td class="px-6 py-4">{{.TTL}}</td>
                    <td class="px-6 py-4 font-mono text-xs text-gray-600 dark:text-gray-300 max-w-xs truncate">{{.Values}}</td>
                    <td class="px-6 py-4 text-right whitespace-nowrap">
                        <button type="button"
                            hx-delete="/dashboard/route53/record?zone_id={{$.ZoneID}}&name={{.Name}}&type={{.Type}}"
                            hx-confirm="Delete record {{.Name}} ({{.Type}})?"
                            hx-target="body"
                            class="font-medium text-red-600 dark:text-red-500 hover:underline">Delete</button>
                    </td>
                </tr>
                {{else}}
                <tr class="bg-transparent border-b border-slate-200 dark:border-slate-700 dark:bg-transparent">
                    <td colspan="5" class="px-6 py-8 text-center text-sm text-slate-500 dark:text-slate-400">
                        No records found. Create one to get started.
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>

<!-- Create Record Modal -->
<div id="create-record-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-[480px] shadow-lg rounded-md bg-white dark:bg-gray-800">
        <h3 class="text-lg font-medium leading-6 text-slate-900 dark:text-white mb-4">Create DNS Record</h3>
        <form method="POST" action="/dashboard/route53/record">
            <input type="hidden" name="zone_id" value="{{.ZoneID}}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1" for="rec_name">Record Name</label>
                <input id="rec_name" name="rec_name" type="text" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                    placeholder="www.example.com">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1" for="rec_type">Type</label>
                <select id="rec_type" name="rec_type"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                    <option>A</option>
                    <option>AAAA</option>
                    <option>CNAME</option>
                    <option>MX</option>
                    <option>TXT</option>
                    <option>NS</option>
                    <option>SOA</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1" for="rec_ttl">TTL (seconds)</label>
                <input id="rec_ttl" name="rec_ttl" type="number" value="300" min="1"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1" for="rec_value">Value</label>
                <input id="rec_value" name="rec_value" type="text" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                    placeholder="192.0.2.1">
            </div>
            <div class="flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('create-record-modal').classList.add('hidden')"
                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600">
                    Cancel
                </button>
                <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-blue-700 rounded-md hover:bg-blue-800 focus:outline-none dark:bg-blue-600 dark:hover:bg-blue-700">
                    Create
                </button>
            </div>
        </form>
    </div>
</div>
{{end}}
