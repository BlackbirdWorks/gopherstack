{{define "content"}}
<div class="space-y-6">
    <!-- Header -->
    <div
        class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm glass-panel flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
                <img src="/dashboard/static/icons/athena.svg" class="w-8 h-8 rounded-md shadow-sm"
                    alt="athena" />
                Athena
                {{if .Snippet}}
                {{template "components/snippet" .Snippet}}
                {{end}}
            </h1>
            <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">Workgroups in your in-memory Athena environment.</p>
        </div>
    </div>
    <div
        class="mt-8 relative overflow-x-auto shadow-sm sm:rounded-xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm">
        <table class="w-full text-sm text-left text-slate-500 dark:text-slate-400">
            <thead
                class="text-xs text-gray-700 uppercase bg-slate-50/50 dark:bg-slate-800/50 dark:text-slate-400">
                <tr>
                    <th class="px-6 py-3">Name</th>
                    <th class="px-6 py-3">State</th>
                </tr>
            </thead>
            <tbody>
                {{range .WorkGroups}}
                <tr
                    class="bg-transparent border-b border-slate-200 dark:border-slate-700 dark:bg-transparent">
                    <td class="px-6 py-4 font-semibold text-slate-900 dark:text-white">
                        <a href="/dashboard/athena/workgroup?name={{.Name}}"
                            class="text-blue-600 hover:underline dark:text-blue-400">{{.Name}}</a>
                    </td>
                    <td class="px-6 py-4">
                        <span
                            class="px-2 py-0.5 text-xs font-mono bg-green-100 text-green-800 rounded dark:bg-green-900 dark:text-green-300">{{.State}}</span>
                    </td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="2"
                        class="px-6 py-8 text-center text-sm text-slate-500 dark:text-slate-400">No workgroups found.</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
