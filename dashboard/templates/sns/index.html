{{define "content"}}
<div class="px-4 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center">
        <div class="sm:flex-auto">
            <h1 class="text-base font-semibold leading-6 text-gray-900 dark:text-gray-100">SNS Topics</h1>
            <p class="mt-2 text-sm text-gray-700 dark:text-gray-300">A list of all topics in your in-memory mocked SNS environment.</p>
        </div>
        <div class="mt-4 sm:ml-16 sm:mt-0 sm:flex-none">
            <button type="button" onclick="document.getElementById('create_topic_modal').showModal()"
                class="btn btn-primary text-sm">
                Create topic
            </button>
        </div>
    </div>
    <div class="mt-8 flow-root">
        <div class="-mx-4 -my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
            <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8">
                <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 sm:rounded-lg">
                    <table class="min-w-full">
                        <thead>
                            <tr>
                                <th scope="col" class="py-3.5 pl-4 pr-3 sm:pl-6">Topic ARN</th>
                                <th scope="col" class="px-3 py-3.5">Display Name</th>
                                <th scope="col" class="relative py-3.5 pl-3 pr-4 sm:pr-6"><span class="sr-only">Actions</span></th>
                            </tr>
                        </thead>
                        <tbody>
                            {{range .Topics}}
                            <tr>
                                <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 dark:text-gray-100 sm:pl-6 font-mono">
                                    <a href="/dashboard/sns/topic?arn={{.TopicArn}}"
                                        class="text-blue-600 hover:text-blue-900 dark:text-blue-400 dark:hover:text-blue-300">
                                        {{.TopicArn}}
                                    </a>
                                </td>
                                <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 dark:text-gray-400">
                                    {{index .Attributes "DisplayName"}}
                                </td>
                                <td class="relative whitespace-nowrap py-4 pl-3 pr-4 text-right text-sm font-medium sm:pr-6">
                                    <button hx-delete="/dashboard/sns/delete?arn={{.TopicArn}}"
                                        hx-confirm="Are you sure you want to delete this topic?"
                                        hx-target="body"
                                        class="text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300">Delete<span class="sr-only">, {{.TopicArn}}</span></button>
                                </td>
                            </tr>
                            {{else}}
                            <tr>
                                <td colspan="3" class="px-3 py-8 text-center text-sm text-gray-500 dark:text-gray-400">
                                    No topics found. Create one to get started.
                                </td>
                            </tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Create Topic Modal -->
<dialog id="create_topic_modal" class="modal">
    <div class="modal-box">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white">Create SNS Topic</h3>
        <form hx-post="/dashboard/sns/create" hx-target="body" class="mt-4 space-y-4">
            <div class="form-control">
                <label class="label" for="sns_name"><span class="label-text">Topic name</span></label>
                <input type="text" name="name" id="sns_name" required class="input input-bordered w-full">
            </div>
            <div class="modal-action">
                <button type="submit" class="btn btn-primary">Create</button>
                <button type="button" class="btn btn-ghost"
                    onclick="document.getElementById('create_topic_modal').close()">Cancel</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
{{end}}
