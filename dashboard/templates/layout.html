<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Gopherstack</title>

    <script>
        (function () {
            const storageKey = 'gopherstack-theme';
            const stored = localStorage.getItem(storageKey);
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = stored || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.classList.toggle('dark', theme === 'dark');
        })();
    </script>

    <!-- Tailwind CSS + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="/dashboard/static/styles.css">
</head>

<body class="bg-base-200">
    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-lg">
        <div class="flex-1">
            <a href="/dashboard" class="btn btn-ghost text-xl">
                🐹 Gopherstack
            </a>
        </div>
        <div class="flex-none">
            <ul class="menu menu-horizontal px-1">
                <li><a href="/dashboard/dynamodb" class="{{if eq .ActiveTab " dynamodb"}}active{{end}}">DynamoDB</a>
                </li>
                <li><a href="/dashboard/s3" class="{{if eq .ActiveTab " s3"}}active{{end}}">S3</a></li>
                <li><a href="/dashboard/ssm" class="{{if eq .ActiveTab " ssm"}}active{{end}}">SSM</a></li>
                <li><a href="/dashboard/sns" class="{{if eq .ActiveTab " sns"}}active{{end}}">SNS</a></li>
                <li><a href="/dashboard/metrics" class="{{if eq .ActiveTab " metrics"}}active{{end}}">Metrics</a></li>
                <li><a href="/dashboard/docs" class="{{if eq .ActiveTab " docs"}}active{{end}}">Docs</a></li>
            </ul>
        </div>
        <div class="flex-none gap-2">
            <button id="theme-toggle" class="btn btn-ghost btn-circle" title="Toggle dark mode">
                <svg id="theme-icon" class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="1.8">
                    <!-- Sun icon -->
                    <path id="sun-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round"
                        d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364-6.364-1.414 1.414M7.05 16.95l-1.414 1.414m0-11.314 1.414 1.414m11.314 11.314-1.414-1.414M12 8a4 4 0 100 8 4 4 0 000-8z" />
                    <!-- Moon icon -->
                    <path id="moon-icon" stroke-linecap="round" stroke-linejoin="round"
                        d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Alerts Container (for OOB swaps) -->
    <div id="global-alerts"
        class="fixed top-4 left-1/2 -translate-x-1/2 z-[1000] w-full max-w-2xl px-4 space-y-2 pointer-events-none">
        <!-- Alerts will be injected here -->
    </div>

    <!-- Main content -->
    <main class="container mx-auto px-4 py-8">
        {{template "content" .}}
    </main>

    <!-- Footer -->
    <footer class="footer footer-center p-4 bg-base-100 text-base-content mt-8">
        <div>
            <p>Gopherstack - In-Memory AWS Stack for Go</p>
        </div>
    </footer>

    <!-- Global Confirmation Modal -->
    <dialog id="global_confirm_modal" class="modal">
        <div class="modal-box">
            <h3 id="global_confirm_title" class="text-lg font-bold">Confirmation</h3>
            <p id="global_confirm_message" class="py-4 text-base-content/70">Are you sure you want to proceed?</p>
            <div class="modal-action">
                <button id="global_confirm_cancel" class="btn btn-ghost">Cancel</button>
                <button id="global_confirm_proceed" class="btn btn-primary">Confirm</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <!-- Custom JavaScript -->
    <script>
        // Ensure Tailwind respects the theme change
        window.addEventListener('theme-changed', (e) => {
            document.documentElement.classList.toggle('dark', e.detail.theme === 'dark');
        });
    </script>
    <script src="/dashboard/static/app.js"></script>
</body>

</html>
