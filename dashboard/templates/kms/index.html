{{define "content"}}
<div class="px-4 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center justify-between mb-8">
        <div class="sm:flex-auto">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">KMS Keys</h1>
            <p class="mt-2 text-sm text-gray-700 dark:text-gray-300">A list of all customer-managed keys in the
                in-memory KMS service.</p>
        </div>
    </div>
    <div class="mt-8 relative overflow-x-auto shadow-md sm:rounded-lg">
        <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                <tr>
                    <th scope="col" class="px-6 py-3">Key ID</th>
                    <th scope="col" class="px-6 py-3">ARN</th>
                </tr>
            </thead>
            <tbody>
                {{range .Keys}}
                <tr
                    class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600">
                    <td class="px-6 py-4 font-mono text-sm text-gray-900 dark:text-white whitespace-nowrap">{{.KeyID}}
                    </td>
                    <td class="px-6 py-4 font-mono text-sm break-all" title="{{.KeyArn}}">{{.KeyArn}}</td>
                </tr>
                {{else}}
                <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                    <td colspan="2" class="px-6 py-8 text-center text-sm text-gray-500 dark:text-gray-400">
                        No KMS keys found. Use CreateKey to add one.
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
