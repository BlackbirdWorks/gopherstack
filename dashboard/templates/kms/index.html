{{define "content"}}
<div class="px-4 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center">
        <div class="sm:flex-auto">
            <h1 class="text-base font-semibold leading-6 text-gray-900 dark:text-gray-100">KMS Keys</h1>
            <p class="mt-2 text-sm text-gray-700 dark:text-gray-300">A list of all customer-managed keys in the
                in-memory KMS service.</p>
        </div>
    </div>
    <div class="mt-8 flow-root">
        <div class="-mx-4 -my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
            <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8">
                <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 sm:rounded-lg">
                    <table class="min-w-full divide-y divide-gray-300 dark:divide-gray-700">
                        <thead class="bg-gray-50 dark:bg-gray-800">
                            <tr>
                                <th scope="col"
                                    class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 dark:text-gray-200 sm:pl-6">
                                    Key ID</th>
                                <th scope="col"
                                    class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900 dark:text-gray-200">
                                    ARN</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 dark:divide-gray-700 bg-white dark:bg-gray-900">
                            {{range .Keys}}
                            <tr>
                                <td
                                    class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 dark:text-gray-100 sm:pl-6 font-mono">
                                    {{.KeyId}}</td>
                                <td
                                    class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 dark:text-gray-400 font-mono truncate max-w-xs"
                                    title="{{.KeyArn}}">
                                    {{.KeyArn}}</td>
                            </tr>
                            {{else}}
                            <tr>
                                <td colspan="2" class="px-3 py-8 text-center text-sm text-gray-500 dark:text-gray-400">
                                    No KMS keys found. Use CreateKey to add one.
                                </td>
                            </tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
