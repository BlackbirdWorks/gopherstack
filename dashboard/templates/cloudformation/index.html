{{define "content"}}
<div class="px-4 sm:px-6 lg:px-8">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">CloudFormation</h1>
    <p class="mt-2 text-sm text-gray-700 dark:text-gray-300">Stacks in your in-memory CloudFormation environment.</p>
    <div class="mt-8 relative overflow-x-auto shadow-md sm:rounded-lg">
        <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                <tr>
                    <th class="px-6 py-3">Name</th>
                    <th class="px-6 py-3">Status</th>
                    <th class="px-6 py-3">Created</th>
                    <th class="px-6 py-3">Stack ID</th>
                </tr>
            </thead>
            <tbody>
                {{range .Stacks}}
                <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                    <td class="px-6 py-4 font-mono text-gray-900 dark:text-white">
                        <a href="/dashboard/cloudformation/stack?name={{.StackName}}" class="text-blue-600 hover:underline dark:text-blue-400">{{.StackName}}</a>
                    </td>
                    <td class="px-6 py-4 font-mono text-gray-500 dark:text-gray-400">{{.StackStatus}}</td>
                    <td class="px-6 py-4 font-mono text-gray-500 dark:text-gray-400">{{.CreationTime.Format "2006-01-02 15:04:05"}}</td>
                    <td class="px-6 py-4 font-mono text-xs text-gray-500 dark:text-gray-400">{{.StackID}}</td>
                </tr>
                {{else}}
                <tr><td colspan="4" class="px-6 py-8 text-center text-sm text-gray-500 dark:text-gray-400">No stacks found.</td></tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
