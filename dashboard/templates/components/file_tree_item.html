{{define "file-tree-item"}}
{{if .IsFolder}}
<div class="collapse collapse-arrow bg-base-200 mb-2">
    <input type="checkbox" hx-get="/dashboard/s3/bucket/{{.BucketName}}/tree?prefix={{.FullPath}}"
        hx-trigger="change once" hx-target="next .collapse-content" />
    <label class="collapse-title font-medium flex items-center gap-2 cursor-pointer">
        <span>📁</span> {{.Name}}
    </label>
    <div class="collapse-content">
        <span class="loading loading-spinner loading-sm"></span> Loading...
    </div>
</div>
{{else}}
<div class="flex items-center justify-between p-3 bg-base-100 rounded-lg mb-2 hover:bg-base-200 s3-file-row">
    <div class="flex items-center gap-3">
        <span>📄</span>
        <a href="/dashboard/s3/bucket/{{.BucketName}}/file/{{.FullPath}}" class="link link-hover">{{.Name}}</a>
    </div>
    <div class="flex items-center gap-2 text-sm text-base-content/60">
        <span>{{.Size}}</span>
        <span>{{.LastModified}}</span>
        <div class="dropdown dropdown-end">
            <label tabindex="0" class="btn btn-ghost btn-xs">⋮</label>
            <ul tabindex="0"
                class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-64 border border-base-300">
                <li><a href="/dashboard/s3/bucket/{{.BucketName}}/download/{{.FullPath}}">Download</a></li>
                <li><button hx-delete="/dashboard/s3/bucket/{{.BucketName}}/file/{{.FullPath}}"
                        hx-confirm="Are you sure you want to delete this file?" hx-target="closest .s3-file-row"
                        hx-swap="outerHTML" class="text-left w-full">Delete (Latest)</button></li>
                <li><button hx-delete="/dashboard/s3/bucket/{{.BucketName}}/file/{{.FullPath}}?deleteAll=true"
                        hx-confirm="WARNING: This will permanently delete ALL versions of this file! Are you sure?"
                        hx-target="closest .s3-file-row" hx-swap="outerHTML" class="text-error text-left w-full">Delete
                        All Versions</button></li>
            </ul>
        </div>
    </div>
</div>
{{end}}
{{end}}
