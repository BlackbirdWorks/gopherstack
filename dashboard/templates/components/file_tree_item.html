{{define "file-tree-item"}}
{{if .IsFolder}}
<div class="mb-2">
    <button type="button"
        class="flex items-center justify-between w-full p-2 font-medium text-left text-gray-700 border border-gray-200 rounded-lg focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-800 dark:border-gray-700 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800"
        onclick="document.getElementById('folder-{{.FullPath | safeID}}').classList.toggle('hidden'); this.querySelector('svg').classList.toggle('rotate-180');"
        hx-get="/dashboard/s3/bucket/{{.BucketName}}/tree?prefix={{.FullPath}}" hx-trigger="click once"
        hx-target="#folder-content-{{.FullPath | safeID}}">
        <span class="flex items-center gap-2"><span>📁</span> {{.Name}}</span>
        <svg class="w-3 h-3 rotate-180 shrink-0 transition-transform duration-200" aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5 5 1 1 5" />
        </svg>
    </button>
    <div id="folder-{{.FullPath | safeID}}" class="hidden" aria-labelledby="folder-{{.FullPath | safeID}}">
        <div id="folder-content-{{.FullPath | safeID}}" class="p-2 ms-4 border-s border-gray-100 dark:border-gray-700">
            <div role="status">
                <svg aria-hidden="true" class="w-4 h-4 text-gray-200 animate-spin dark:text-gray-600 fill-blue-600"
                    viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                        fill="currentColor" />
                    <path
                        d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                        fill="currentFill" />
                </svg>
                <span class="ms-2 text-sm text-gray-500">Loading...</span>
            </div>
        </div>
    </div>
</div>
{{else}}
<div
    class="flex items-center justify-between p-3 bg-white dark:bg-gray-800 rounded-lg mb-2 hover:bg-gray-50 dark:hover:bg-gray-700 border border-gray-100 dark:border-gray-700 s3-file-row group">
    <div class="flex items-center gap-3">
        <span>📄</span>
        <a href="/dashboard/s3/bucket/{{.BucketName}}/file/{{.FullPath}}"
            class="text-blue-600 hover:underline dark:text-blue-400 font-medium">{{.Name}}</a>
    </div>
    <div class="flex items-center gap-4 text-sm text-slate-500 dark:text-slate-400">
        <span>{{.Size}}</span>
        <span class="hidden md:inline">{{.LastModified}}</span>

        <button id="dropdown-{{.FullPath | safeID}}-btn" data-dropdown-toggle="dropdown-{{.FullPath | safeID}}"
            class="text-slate-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-gray-700 focus:ring-4 focus:outline-none focus:ring-gray-200 dark:focus:ring-gray-700 rounded-lg text-sm p-1.5 inline-flex items-center"
            type="button">
            <svg class="w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                viewBox="0 0 4 15">
                <path
                    d="M3.5 1.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm0 6.041a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm0 5.959a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z" />
            </svg>
            <span class="sr-only">File actions</span>
        </button>
        <!-- Dropdown menu -->
        <div id="dropdown-{{.FullPath | safeID}}"
            class="z-10 hidden bg-white divide-y divide-gray-100 rounded-lg shadow w-44 dark:bg-gray-700 dark:divide-gray-600 border border-gray-200 dark:border-gray-600">
            <ul class="py-2 text-sm text-gray-700 dark:text-gray-200"
                aria-labelledby="dropdown-{{.FullPath | safeID}}-btn">
                <li>
                    <a href="/dashboard/s3/bucket/{{.BucketName}}/download/{{.FullPath}}"
                        class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">Download</a>
                </li>
                <li>
                    <button hx-delete="/dashboard/s3/bucket/{{.BucketName}}/file/{{.FullPath}}"
                        hx-confirm="Are you sure you want to delete this file?" hx-target="closest .s3-file-row"
                        hx-swap="outerHTML"
                        class="block w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">Delete
                        (Latest)</button>
                </li>
            </ul>
            <div class="py-2">
                <button hx-delete="/dashboard/s3/bucket/{{.BucketName}}/file/{{.FullPath}}?deleteAll=true"
                    hx-confirm="WARNING: This will permanently delete ALL versions of this file! Are you sure?"
                    hx-target="closest .s3-file-row" hx-swap="outerHTML"
                    class="block w-full text-left px-4 py-2 text-red-600 dark:text-red-400 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">Delete
                    All Versions</button>
            </div>
        </div>
    </div>
</div>
{{end}}
{{end}}
