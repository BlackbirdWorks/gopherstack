{{define "table-card"}}
<div
    class="p-6 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-slate-200 dark:border-slate-700 shadow-sm rounded-xl glass-panel hover:shadow-lg transition-shadow">
    <h2 class="mb-4 text-xl font-bold tracking-tight text-slate-900 dark:text-white">
        <a href="/dashboard/dynamodb/table/{{.TableName}}"
            class="text-blue-600 hover:underline dark:text-blue-400">{{.TableName}}</a>
    </h2>
    <div class="space-y-3 text-sm">
        <div class="flex justify-between items-center">
            <span class="text-slate-500 dark:text-slate-400">Partition Key:</span>
            <span class="font-mono text-slate-900 dark:text-white font-medium">{{.PartitionKey}}
                ({{.PartitionKeyType}})</span>
        </div>
        {{if .SortKey}}
        <div class="flex justify-between items-center">
            <span class="text-slate-500 dark:text-slate-400">Sort Key:</span>
            <span class="font-mono text-slate-900 dark:text-white font-medium">{{.SortKey}} ({{.SortKeyType}})</span>
        </div>
        {{end}}
        <div class="flex justify-between items-center">
            <span class="text-slate-500 dark:text-slate-400">Item Count:</span>
            <span
                class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-blue-900 dark:text-blue-300">{{.ItemCount}}</span>
        </div>
        {{if .GSICount}}
        <div class="flex justify-between items-center">
            <span class="text-slate-500 dark:text-slate-400">GSI:</span>
            <span
                class="bg-purple-100 text-purple-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-purple-900 dark:text-purple-300">{{.GSICount}}</span>
        </div>
        {{end}}
        {{if .LSICount}}
        <div class="flex justify-between items-center">
            <span class="text-slate-500 dark:text-slate-400">LSI:</span>
            <span
                class="bg-indigo-100 text-indigo-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-indigo-900 dark:text-indigo-300">{{.LSICount}}</span>
        </div>
        {{end}}
    </div>
    <div class="flex justify-end mt-6 pt-4 border-t border-gray-100 dark:border-gray-700">
        <button
            class="py-2 px-3 text-xs font-medium text-white bg-red-700 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 rounded-lg text-center dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800"
            hx-delete="/dashboard/dynamodb/table/{{.TableName}}"
            hx-confirm="Are you sure you want to delete table '{{.TableName}}'?" hx-target="#table-list">
            Delete
        </button>
    </div>
</div>
{{end}}
