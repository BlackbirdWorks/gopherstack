{{define "pagination"}}
<div class="flex flex-col md:flex-row justify-between items-center bg-base-200 p-4 rounded-lg col-span-full gap-4 mt-4">
    <div class="text-sm font-medium">
        Showing page <span class="badge badge-ghost">{{.CurrentPage}}</span> of <span
            class="badge badge-ghost">{{.TotalPages}}</span>
        (<span class="badge badge-ghost">{{.TotalItems}}</span> total items)
    </div>

    <div class="join">
        <button class="join-item btn btn-sm {{if not .HasPrev}}btn-disabled{{end}}"
            hx-get="{{.BaseEndpoint}}?offset={{.PrevOffset}}&search={{.SearchQuery}}" hx-target="{{.TargetID}}"
            hx-indicator=".htmx-indicator" {{if not .HasPrev}}disabled{{end}}>
            « Prev
        </button>

        <button class="join-item btn btn-sm btn-active">
            Page {{.CurrentPage}}
        </button>

        <button class="join-item btn btn-sm {{if not .HasNext}}btn-disabled{{end}}"
            hx-get="{{.BaseEndpoint}}?offset={{.NextOffset}}&search={{.SearchQuery}}" hx-target="{{.TargetID}}"
            hx-indicator=".htmx-indicator" {{if not .HasNext}}disabled{{end}}>
            Next »
        </button>
    </div>
</div>

<!-- OOB update for top pagination -->
<div id="pagination-top" hx-swap-oob="true">
    <div class="join">
        <button class="join-item btn btn-xs {{if not .HasPrev}}btn-disabled{{end}}"
            hx-get="{{.BaseEndpoint}}?offset={{.PrevOffset}}&search={{.SearchQuery}}" hx-target="{{.TargetID}}"
            hx-indicator=".htmx-indicator" {{if not .HasPrev}}disabled{{end}}>
            «
        </button>
        <button class="join-item btn btn-xs btn-active">
            Page {{.CurrentPage}}/{{.TotalPages}}
        </button>
        <button class="join-item btn btn-xs {{if not .HasNext}}btn-disabled{{end}}"
            hx-get="{{.BaseEndpoint}}?offset={{.NextOffset}}&search={{.SearchQuery}}" hx-target="{{.TargetID}}"
            hx-indicator=".htmx-indicator" {{if not .HasNext}}disabled{{end}}>
            »
        </button>
    </div>
</div>
{{end}}
