{{define "pagination"}}
<div class="flex flex-col md:flex-row justify-between items-center bg-gray-50 dark:bg-gray-800 p-4 rounded-lg col-span-full gap-4 mt-4 border border-gray-200 dark:border-gray-700">
    <div class="text-sm font-medium text-gray-700 dark:text-gray-300">
        Showing page <span class="badge badge-ghost">{{.CurrentPage}}</span> of <span
            class="badge badge-ghost">{{.TotalPages}}</span>
        (<span class="badge badge-ghost">{{.TotalItems}}</span> total items)
    </div>

    <div class="flex gap-1">
        <button class="btn btn-sm {{if not .HasPrev}}opacity-50 cursor-not-allowed{{end}}"
            hx-get="{{.BaseEndpoint}}?offset={{.PrevOffset}}&search={{.SearchQuery}}" hx-target="{{.TargetID}}"
            hx-indicator=".htmx-indicator" {{if not .HasPrev}}disabled{{end}}>
            « Prev
        </button>

        <button class="btn btn-sm btn-primary">
            Page {{.CurrentPage}}
        </button>

        <button class="btn btn-sm {{if not .HasNext}}opacity-50 cursor-not-allowed{{end}}"
            hx-get="{{.BaseEndpoint}}?offset={{.NextOffset}}&search={{.SearchQuery}}" hx-target="{{.TargetID}}"
            hx-indicator=".htmx-indicator" {{if not .HasNext}}disabled{{end}}>
            Next »
        </button>
    </div>
</div>

<!-- OOB update for top pagination -->
<div id="pagination-top" hx-swap-oob="true">
    <div class="flex gap-1">
        <button class="btn btn-xs {{if not .HasPrev}}opacity-50 cursor-not-allowed{{end}}"
            hx-get="{{.BaseEndpoint}}?offset={{.PrevOffset}}&search={{.SearchQuery}}" hx-target="{{.TargetID}}"
            hx-indicator=".htmx-indicator" {{if not .HasPrev}}disabled{{end}}>
            «
        </button>
        <button class="btn btn-xs btn-primary">
            Page {{.CurrentPage}}/{{.TotalPages}}
        </button>
        <button class="btn btn-xs {{if not .HasNext}}opacity-50 cursor-not-allowed{{end}}"
            hx-get="{{.BaseEndpoint}}?offset={{.NextOffset}}&search={{.SearchQuery}}" hx-target="{{.TargetID}}"
            hx-indicator=".htmx-indicator" {{if not .HasNext}}disabled{{end}}>
            »
        </button>
    </div>
</div>
{{end}}
