{{define "components/snippet"}}
<!-- Snippet Trigger Button -->
<button onclick="window.openSnippetModal('{{.ID}}')" type="button"
    class="inline-flex items-center justify-center w-8 h-8 text-emerald-600 bg-emerald-50 hover:bg-emerald-100 dark:bg-emerald-900/30 dark:hover:bg-emerald-900/50 dark:text-emerald-400 rounded-lg transition-colors focus:ring-2 focus:ring-emerald-500/20 focus:outline-none"
    title="Show Code Snippets">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4">
        </path>
    </svg>
    <span class="sr-only">Show Code Snippet</span>
</button>

<!-- Main modal -->
<div id="snippetModal-{{.ID}}" tabindex="-1" aria-hidden="true" onclick="window.closeSnippetModal('{{.ID}}')"
    class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-[100] justify-center items-center w-full h-full bg-slate-900/50 backdrop-blur-sm">

    <div class="relative p-4 w-full max-w-4xl max-h-full" onclick="event.stopPropagation()">
        <!-- Modal content -->
        <div
            class="code-snippet-generator relative bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 flex flex-col max-h-[90vh]">
            <!-- Modal header -->
            <div
                class="flex items-center justify-between p-4 border-b rounded-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800">
                <h3 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                    {{.Title}}
                </h3>
                <button type="button"
                    class="text-slate-400 bg-transparent hover:bg-slate-200 hover:text-slate-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-slate-600 dark:hover:text-white"
                    onclick="window.closeSnippetModal('{{.ID}}')">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
                    </svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            <!-- Modal Tabs -->
            <div class="px-4 py-3 bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700">
                <div class="flex flex-wrap gap-2">
                    <button
                        class="snippet-tab active text-sm px-4 py-2 rounded-lg font-medium transition-colors bg-emerald-600 text-white shadow-sm hover:bg-emerald-700"
                        onclick="switchSnippet(this, 'cli-{{.ID}}')">AWS CLI</button>
                    <button
                        class="snippet-tab text-sm px-4 py-2 rounded-lg font-medium transition-colors text-slate-600 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-800"
                        onclick="switchSnippet(this, 'go-{{.ID}}')">Go (v2)</button>
                    <button
                        class="snippet-tab text-sm px-4 py-2 rounded-lg font-medium transition-colors text-slate-600 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-800"
                        onclick="switchSnippet(this, 'python-{{.ID}}')">Python</button>
                </div>
            </div>
            <!-- Modal body -->
            <div class="relative p-0 bg-slate-900 rounded-b-xl flex-grow overflow-hidden shadow-inner">
                <!-- Content Wrappers -->
                <div id="cli-{{.ID}}"
                    class="snippet-content text-sm relative group p-6 pr-16 pt-5 overflow-x-auto transition-all duration-200">
                    <pre
                        class="!m-0 !bg-transparent !p-0"><code class="language-bash !bg-transparent !shadow-none !m-0 !p-0 !text-[13px] leading-relaxed">{{.Cli}}</code></pre>
                </div>
                <div id="go-{{.ID}}"
                    class="snippet-content hidden text-sm relative group p-6 pr-16 pt-5 overflow-x-auto transition-all duration-200">
                    <pre
                        class="!m-0 !bg-transparent !p-0"><code class="language-go !bg-transparent !shadow-none !m-0 !p-0 !text-[13px] leading-relaxed">{{.Go}}</code></pre>
                </div>
                <div id="python-{{.ID}}"
                    class="snippet-content hidden text-sm relative group p-6 pr-16 pt-5 overflow-x-auto transition-all duration-200">
                    <pre
                        class="!m-0 !bg-transparent !p-0"><code class="language-python !bg-transparent !shadow-none !m-0 !p-0 !text-[13px] leading-relaxed">{{.Python}}</code></pre>
                </div>

                <!-- Copy Button -->
                <button onclick="copyActiveSnippet(this)"
                    class="absolute top-4 right-6 p-2 rounded-lg bg-white/10 text-slate-300 hover:text-white hover:bg-emerald-600 backdrop-blur-sm transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500 shadow-sm border border-white/5 hover:border-emerald-500 hover:-translate-y-[1px] hover:shadow-lg"
                    title="Copy to clipboard">
                    <svg class="w-5 h-5 copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
                        </path>
                    </svg>
                    <svg class="w-5 h-5 opacity-0 hidden check-icon" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

{{end}}
