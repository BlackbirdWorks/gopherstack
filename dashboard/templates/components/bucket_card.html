{{define "bucket-card"}}
<div
    class="p-6 bg-white border border-gray-200 rounded-lg shadow dark:bg-gray-800 dark:border-gray-700 hover:shadow-lg transition-shadow">
    <h2 class="mb-4 text-xl font-bold tracking-tight text-gray-900 dark:text-white">
        <a href="/dashboard/s3/bucket/{{.Name}}"
            class="flex items-center gap-2 text-blue-600 hover:underline dark:text-blue-400">
            <span>🪣</span> {{.Name}}
        </a>
    </h2>
    <div class="space-y-3 text-sm">
        <div class="flex justify-between items-center">
            <span class="text-gray-500 dark:text-gray-400">Created:</span>
            <span class="text-gray-900 dark:text-white font-medium">{{.CreationDate}}</span>
        </div>
        <div class="flex justify-between items-center">
            <span class="text-gray-500 dark:text-gray-400">Versioning:</span>
            {{if .VersioningEnabled}}
            <span
                class="bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-green-900 dark:text-green-300">Enabled</span>
            {{else}}
            <span
                class="bg-gray-100 text-gray-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-gray-700 dark:text-gray-300">Disabled</span>
            {{end}}
        </div>
        <div class="flex justify-between items-center">
            <span class="text-gray-500 dark:text-gray-400">Objects:</span>
            <span
                class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-blue-900 dark:text-blue-300">{{.ObjectCount}}</span>
        </div>
    </div>
    <div class="flex justify-end gap-2 mt-6 pt-4 border-t border-gray-100 dark:border-gray-700">
        <button
            class="py-2 px-3 text-xs font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100 dark:focus:ring-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700"
            hx-put="/dashboard/s3/bucket/{{.Name}}/versioning"
            hx-vals='{"enabled": {{if .VersioningEnabled}}false{{else}}true{{end}}}' hx-target="#bucket-list"
            hx-swap="innerHTML">
            {{if .VersioningEnabled}}Disable{{else}}Enable{{end}} Versioning
        </button>
        <button
            class="py-2 px-3 text-xs font-medium text-white bg-red-700 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 rounded-lg text-center dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800"
            hx-delete="/dashboard/s3/bucket/{{.Name}}" hx-confirm="Are you sure you want to delete bucket '{{.Name}}'?"
            hx-target="closest div.p-6" hx-swap="outerHTML">
            Delete
        </button>
    </div>
</div>
{{end}}
