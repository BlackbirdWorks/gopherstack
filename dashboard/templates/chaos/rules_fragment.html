{{define "chaos/rules_fragment.html"}}
<div class="overflow-x-auto">
    <table class="w-full text-sm text-left text-slate-500 dark:text-slate-400">
        <thead class="text-xs text-gray-700 uppercase bg-slate-50/50 dark:bg-slate-800/50 dark:text-slate-400">
            <tr>
                <th class="px-4 py-3">Service</th>
                <th class="px-4 py-3">Region</th>
                <th class="px-4 py-3">Operation</th>
                <th class="px-4 py-3">Probability</th>
                <th class="px-4 py-3">Error</th>
                <th class="px-4 py-3">Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Rules}}
            <tr class="bg-transparent border-b border-slate-200 dark:border-slate-700 hover:bg-slate-50/50 dark:hover:bg-slate-700/30 transition-colors">
                <td class="px-4 py-3">
                    <span class="font-mono text-xs font-medium text-slate-700 dark:text-slate-300">{{.Service}}</span>
                </td>
                <td class="px-4 py-3">
                    <span class="font-mono text-xs text-slate-600 dark:text-slate-400">{{.Region}}</span>
                </td>
                <td class="px-4 py-3">
                    <span class="font-mono text-xs text-slate-600 dark:text-slate-400">{{.Operation}}</span>
                </td>
                <td class="px-4 py-3">
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium {{if eq .Probability "100%"}}bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400{{else}}bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400{{end}}">
                        {{.Probability}}
                    </span>
                </td>
                <td class="px-4 py-3">
                    <span class="font-mono text-xs text-slate-600 dark:text-slate-400">{{.StatusCode}} {{.ErrorCode}}</span>
                </td>
                <td class="px-4 py-3">
                    <button
                        hx-delete="/dashboard/chaos/faults"
                        hx-target="#fault-rules-table"
                        hx-swap="innerHTML"
                        hx-headers='{"Content-Type": "application/json"}'
                        hx-vals='{"service": "{{if eq .Service "*"}}{{else}}{{.Service}}{{end}}", "region": "{{if eq .Region "*"}}{{else}}{{.Region}}{{end}}", "operation": "{{if eq .Operation "*"}}{{else}}{{.Operation}}{{end}}"}'
                        hx-confirm="Remove this fault rule?"
                        class="inline-flex items-center gap-1 px-2 py-1 text-xs font-medium text-red-600 hover:text-red-800 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/30 rounded transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                        Delete
                    </button>
                </td>
            </tr>
            {{else}}
            <tr>
                <td colspan="6" class="px-4 py-8 text-center text-sm text-slate-500 dark:text-slate-400">
                    <div class="flex flex-col items-center gap-2">
                        <svg class="w-8 h-8 text-slate-300 dark:text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        No active fault rules. Your services are running normally.
                    </div>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
