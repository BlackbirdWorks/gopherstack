{{define "ssm/put_modal.html"}}
<div id="modal-backdrop" class="relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity dark:bg-gray-900 dark:bg-opacity-80"></div>

    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-lg bg-white dark:bg-gray-800 px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:p-6"
                @click.outside="document.getElementById('modal-container').innerHTML = ''">
                <form hx-post="/dashboard/ssm/put" hx-target="body">
                    <div>
                        <div class="mt-3 text-center sm:mt-5">
                            <h3 class="text-base font-semibold leading-6 text-gray-900 dark:text-white"
                                id="modal-title">
                                {{if .IsEdit}}Update{{else}}Create{{end}} Parameter
                            </h3>
                            <div class="mt-2 text-left">

                                <div class="space-y-4">
                                    <div>
                                        <label for="name"
                                            class="block text-sm font-medium leading-6 text-gray-900 dark:text-gray-200">Parameter
                                            name</label>
                                        <div class="mt-2">
                                            <input type="text" name="name" id="name" required value="{{.Name}}" {{if
                                                .IsEdit}}readonly{{end}}
                                                class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white dark:bg-gray-700 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 {{if .IsEdit}}bg-gray-100 dark:bg-gray-800 cursor-not-allowed{{end}}">
                                        </div>
                                    </div>

                                    <div>
                                        <label for="type"
                                            class="block text-sm font-medium leading-6 text-gray-900 dark:text-gray-200">Type</label>
                                        <div class="mt-2">
                                            <select id="type" name="type"
                                                class="mt-2 block w-full rounded-md border-0 py-1.5 pl-3 pr-10 text-gray-900 dark:text-white dark:bg-gray-700 ring-1 ring-inset ring-gray-300 dark:ring-gray-600 focus:ring-2 focus:ring-indigo-600 sm:text-sm sm:leading-6">
                                                <option value="String" {{if eq .Type "String" }}selected{{end}}>String
                                                </option>
                                                <option value="StringList" {{if eq .Type "StringList" }}selected{{end}}>
                                                    StringList</option>
                                                <option value="SecureString" {{if eq .Type "SecureString"
                                                    }}selected{{end}}>SecureString</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label for="value"
                                            class="block text-sm font-medium leading-6 text-gray-900 dark:text-gray-200">Value</label>
                                        <div class="mt-2">
                                            <textarea id="value" name="value" rows="3" required
                                                class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white dark:bg-gray-700 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">{{.Value}}</textarea>
                                        </div>
                                    </div>

                                    <div>
                                        <label for="description"
                                            class="block text-sm font-medium leading-6 text-gray-900 dark:text-gray-200">Description
                                            <span class="text-gray-400">(Optional)</span></label>
                                        <div class="mt-2">
                                            <input type="text" name="description" id="description"
                                                value="{{.Description}}"
                                                class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white dark:bg-gray-700 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-5 sm:mt-6 sm:grid sm:grid-flow-row-dense sm:grid-cols-2 sm:gap-3">
                        <button type="submit"
                            class="inline-flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 sm:col-start-2">
                            {{if .IsEdit}}Save changes{{else}}Create{{end}}
                        </button>
                        <button type="button"
                            class="mt-3 inline-flex w-full justify-center rounded-md bg-white dark:bg-gray-700 px-3 py-2 text-sm font-semibold text-gray-900 dark:text-gray-200 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 sm:col-start-1 sm:mt-0"
                            onclick="document.getElementById('modal-container').innerHTML = ''">
                            Cancel
                        </button>
                    </div>
                    {{if .IsEdit}}
                    <input type="hidden" name="overwrite" value="true">
                    {{end}}
                </form>
            </div>
        </div>
    </div>
    {{end}}
</div>
