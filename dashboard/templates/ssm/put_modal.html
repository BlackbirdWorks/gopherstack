{{define "ssm/put_modal.html"}}
<div id="modal-backdrop" class="relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity dark:bg-gray-900 dark:bg-opacity-80"></div>
    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-lg bg-white dark:bg-gray-800 px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:p-6">
                <form hx-post="/dashboard/ssm/put" hx-target="body">
                    <div class="mt-3 text-center sm:mt-5">
                        <h3 class="text-base font-semibold leading-6 text-gray-900 dark:text-white" id="modal-title">
                            {{if .IsEdit}}Update{{else}}Create{{end}} Parameter
                        </h3>
                        <div class="mt-4 text-left space-y-4">
                            <div>
                                <label for="name" class="block text-sm font-medium text-gray-900 dark:text-gray-200">Parameter name</label>
                                <input type="text" name="name" id="name" required value="{{.Name}}" {{if .IsEdit}}readonly{{end}}
                                    class="mt-1 input input-bordered w-full {{if .IsEdit}}opacity-60 cursor-not-allowed{{end}}">
                            </div>
                            <div>
                                <label for="type" class="block text-sm font-medium text-gray-900 dark:text-gray-200">Type</label>
                                <select id="type" name="type" class="mt-1 select select-bordered w-full">
                                    <option value="String" {{if eq .Type "String"}}selected{{end}}>String</option>
                                    <option value="StringList" {{if eq .Type "StringList"}}selected{{end}}>StringList</option>
                                    <option value="SecureString" {{if eq .Type "SecureString"}}selected{{end}}>SecureString</option>
                                </select>
                            </div>
                            <div>
                                <label for="value" class="block text-sm font-medium text-gray-900 dark:text-gray-200">Value</label>
                                <textarea id="value" name="value" rows="3" required
                                    class="mt-1 textarea textarea-bordered w-full">{{.Value}}</textarea>
                            </div>
                            <div>
                                <label for="description" class="block text-sm font-medium text-gray-900 dark:text-gray-200">
                                    Description <span class="text-gray-400">(Optional)</span>
                                </label>
                                <input type="text" name="description" id="description" value="{{.Description}}"
                                    class="mt-1 input input-bordered w-full">
                            </div>
                        </div>
                    </div>
                    <div class="mt-5 sm:mt-6 sm:grid sm:grid-flow-row-dense sm:grid-cols-2 sm:gap-3">
                        <button type="submit" class="btn btn-primary w-full sm:col-start-2">
                            {{if .IsEdit}}Save changes{{else}}Create{{end}}
                        </button>
                        <button type="button" class="btn btn-ghost w-full mt-3 sm:col-start-1 sm:mt-0"
                            onclick="document.getElementById('modal-container').innerHTML = ''">
                            Cancel
                        </button>
                    </div>
                    {{if .IsEdit}}
                    <input type="hidden" name="overwrite" value="true">
                    {{end}}
                </form>
            </div>
        </div>
    </div>
</div>
{{end}}
