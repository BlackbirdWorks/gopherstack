# GoReleaser configuration for Gopherstack
# Documentation: https://goreleaser.com

version: 2

before:
  hooks:
    # Clean up before building
    - go mod tidy
    - go mod download
    # Login to DockerHub before pushing
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

builds:
  - id: gopherstack
    main: ./main.go
    binary: gopherstack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Build tags for static linking
    tags:
      - netgo
      - osusergo
      - static_build
    # ldflags for version information and optimization
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -extldflags "-static"
    # Ignore certain combinations
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: gopherstack-archive
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: 'New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug Fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: 'Performance Improvements'
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 2
    - title: 'Refactors'
      regexp: "^.*refactor[(\\w)]*:+.*$"
      order: 3
    - title: 'Other Changes'
      order: 999

dockers_v2:
  - id: gopherstack
    dockerfile: Dockerfile.goreleaser
    ids:
      - gopherstack
    images:
      - "ghcr.io/blackbirdworks/gopherstack"
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Version}}"
      org.opencontainers.image.source: "{{.GitURL}}"
    platforms:
      - linux/amd64
      - linux/arm64

release:
  github:
    owner: blackbirdworks
    name: gopherstack
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Gopherstack {{ .Tag }} Release
    
    **Full Changelog**: https://github.com/blackbirdworks/Gopherstack/compare/{{ .PreviousTag }}...{{ .Tag }}
  footer: |
    ## Docker Images
    
    ```bash
    docker pull ghcr.io/blackbirdworks/gopherstack:{{ .Version }}
    # or
    docker pull ghcr.io/blackbirdworks/gopherstack:latest
    ```
    
    ## Installation
    
    ### Binary
    Download the appropriate binary for your platform from the assets below.
    
    ### From Source
    ```bash
    go install github.com/blackbirdworks/gopherstack@{{ .Tag }}
    ```

# Announce the release
announce:
  skip: '{{gt .Patch 0}}'
